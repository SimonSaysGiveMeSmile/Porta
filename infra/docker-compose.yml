services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: porta
      POSTGRES_PASSWORD: porta
      POSTGRES_DB: porta
    ports:
      - "5432:5432"
    volumes:
      - porta_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U porta"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  porta_pg:

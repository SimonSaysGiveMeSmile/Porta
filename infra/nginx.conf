# nginx config for the web receiver. /s/* falls through to index.html so the
# SPA can handle the share-token route without needing explicit rewrites.
# Everything else is either a hashed asset or the default document.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Assets with content-hashed filenames — aggressive cache.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Share links → SPA entry.
    location /s/ {
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

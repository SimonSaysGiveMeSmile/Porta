name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum
      - name: Vet
        working-directory: backend
        run: go vet ./...
      - name: Test
        working-directory: backend
        run: go test ./... -race -count=1
      - name: Build
        working-directory: backend
        run: CGO_ENABLED=0 go build -o /tmp/porta ./cmd/porta

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        working-directory: web
        run: npm install --no-audit --no-fund
      - name: Typecheck
        working-directory: web
        run: npm run typecheck
      - name: Build
        working-directory: web
        run: npm run build

  ios-core:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build PortaCore
        working-directory: ios/PortaCore
        run: swift build
      - name: Test PortaCore
        working-directory: ios/PortaCore
        run: swift test
